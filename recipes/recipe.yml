name: quantix
description: My personal distro based on Bazzite with some nice-to-haves for developers from Aurora DX and setup for VFIO by default. Also includes some nice Dracula theming for a pleasant dark colour scheme.

base-image: ghcr.io/ublue-os/bazzite
image-version: stable

modules:
  - type: dnf
    repos:
      files:
        - vscode.repo
        - terra.repo
        - terra-mesa.repo
        - terra-extras.repo
      copr:
        - lizardbyte/stable
        - codifryed/CoolerControl
      keys:
        - https://packages.microsoft.com/keys/microsoft.asc
        - https://download.copr.fedorainfracloud.org/results/lizardbyte/stable/pu$
      install:
        - discord
        - coolercontrol
        - dotnet-sdk-9.0
        - dotnet-sdk-10.0
        - liquidctl
        - kvantum
        - adobe-source-code-pro-fonts
        - cascadia-code-fonts
        - jetbrains-mono-fonts-all
        - ibm-plex-mono-fonts
        - virt-manager
        - virt-viewer
        - edk2-ovmf
        - libvirt
        - qemu
        - qemu-char-spice
        - qemu-device-display-virtio-gpu
        - qemu-device-display-virtio-vga
        - qemu-device-usb-redirect
        - qemu-img
        - qemu-system-x86-core
        - qemu-user-binfmt
        - qemu-user-static
        - code
        - papirus-icon-theme
        - libXpresent
        - ninja-build
        - nasm
        - iasl
        - libuuid-devel
        - glib2-devel
        - pixman-devel
        - spice-protocol
        - ddrescue
        - Sunshine
        - konsole
      remove:
        - ptyxis

  - type: script
    snippets:
      - "test -L /usr/bin/discord && rm -f /usr/bin/discord"

  - type: files
    files:
      - source: system
        destination: /

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - app.zen_browser.zen
          - com.vysp3r.ProtonPlus
        remove:
          - org.mozilla.firefox
          - net.davidotek.pupgui2

  - type: systemd
    system:
      enabled:
        - quantix-system-setup.service
        - discord-overlay.service
        - libvirtd
        - swtpm-workaround
        - tailscaled.service
    user:
      enabled:
        - sunshine.service
        - quantix-user-setup.service

  - type: script
    scripts:
      - install-dracula.sh
      - qtx-info.sh

  - type: os-release
    properties:
      NAME: Quantix
      PRETTY_NAME: Quantix OS

  - type: initramfs

  - type: signing
